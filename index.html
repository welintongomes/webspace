    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(15, 15, 35, 0.9);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: var(--neon-cyan);
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo animado cyberpunk - APENAS DESKTOP */
        @media (min-width: 769px) {
            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background:
                    linear-gradient(45deg, transparent 30%, rgba(255, 0, 255, 0.03) 30%, rgba(255, 0, 255, 0.03) 70%, transparent 70%),
                    linear-gradient(-45deg, transparent 30%, rgba(0, 255, 255, 0.03) 30%, rgba(0, 255, 255, 0.03) 70%, transparent 70%);
                background-size: 50px 50px;
                animation: gridMove 20s linear infinite;
                z-index: 0;
                pointer-events: none;
            }

            @keyframes gridMove {
                0% { background-position: 0 0, 0 0; }
                100% { background-position: 50px 50px, -50px 50px; }
            }

            /* Linhas de scan - APENAS DESKTOP */
            body::after {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(to bottom,
                        transparent 50%,
                        rgba(0, 255, 255, 0.02) 50%);
                background-size: 100% 4px;
                animation: scanlines 10s linear infinite;
                z-index: 1;
                pointer-events: none;
            }

            @keyframes scanlines {
                0% { background-position: 0 0; }
                100% { background-position: 0 100%; }
            }
        }

        /* Background simples para mobile - SEM ANIMAÇÕES */
        @media (max-width: 768px) {
            body {
                background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            color: white;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            margin-bottom: 0px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow:
                0 0 10px rgba(0, 255, 255, 0.5),
                0 0 20px rgba(255, 0, 255, 0.3),
                0 0 30px rgba(0, 255, 255, 0.2);
            animation: glitchText 3s infinite;
            letter-spacing: 3px;
        }

        @keyframes glitchText {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .sites-grid {
            padding: 5.3px 3px 10px 5px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            min-height: 200px;
            max-height: 71.7vh;
            overflow-y: auto;
        }

        /* Scrollbar customizada */
        .sites-grid::-webkit-scrollbar { width: 6px; }
        .sites-grid::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); border-radius: 10px; }
        .sites-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .site-card {
            margin-top: 5px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 9px;
            border: 2px solid transparent;
            background-image:
                linear-gradient(var(--card-bg), var(--card-bg)),
                linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 20px rgba(0, 255, 255, 0.1),
                inset 0 0 20px rgba(0, 255, 255, 0.05);
        }

        /* Efeito de scan no hover */
        .site-card::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    transparent,
                    rgba(0, 255, 255, 0.2),
                    transparent);
            transition: top 0.6s;
        }

        .site-card:hover::before { top: 100%; }

        .site-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--neon-cyan);
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.4),
                0 0 60px rgba(255, 0, 255, 0.2),
                inset 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .site-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            margin-bottom: 10px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            letter-spacing: 2px;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .site-card p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .site-actions {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
}

        .btn {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 500;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before { width: 300px; height: 300px; }

        .btn-primary {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .btn-primary:hover {

            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0, 255, 255, 0.5);

        }

        .btn-secondary {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .add-site-btn {
    position: fixed;
    bottom: 1%;
    right: 5%;
    width: 60px;
    height: 60px;
    border-radius: 32%;
    background: linear-gradient(
153deg, var(--neon-magenta), #271f8e);
    border: 3px solid #d106d1;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255, 0, 255, 0.6),

    z-index: 1000;
    font-weight: bold;
}

        .add-site-btn:hover {
            transform: scale(1.15) rotate(90deg);
            box-shadow:
                0 0 50px var(--neon-magenta),
                0 0 100px rgba(255, 0, 255, 0.5);
        }

        .search-random-btn {
    position: fixed;
    bottom: 5px;
    right: 160px;
    width: 61px;
    height: 61px;
    border-radius: 32%;
    background: linear-gradient(346deg, #1f1796, #a90c41);
    border: 3px solid #6c0ed366;
    color: var(--dark-bg);
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.6),
                0 0 60px rgba(0, 255, 255, 0.3);
    transition: all 0.3s ease;
    z-index: 1000;
}

        .search-random-btn:hover {
            transform: scale(1.15);
            box-shadow:
                0 0 50px var(--neon-cyan),
                0 0 100px rgba(0, 255, 255, 0.5);
        }

        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
        }

        .fullscreen-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .fullscreen-header {
            background: linear-gradient(135deg, rgba(15, 15, 35, 0.95), rgba(30, 0, 50, 0.95));
            color: var(--neon-cyan);
            padding: 3px 20px;
            display: flex;
            justify-content: space-between;
            align-items: normal;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 5px 30px rgba(0, 255, 255, 0.3);
        }

        .fullscreen-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .close-btn {
            background: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 20px #ff0055;
        }

        .edit-btn {
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            background: var(--neon-magenta);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        .site-frame {
            flex: 1;
            border: none;
            background: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--neon-cyan);
            box-shadow:
                0 0 50px rgba(0, 255, 255, 0.4),
                0 0 100px rgba(255, 0, 255, 0.2);
                scrollbar-color: rgb(27 245 245 / 26%) transparent;
        }

        .modal-content h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea {
            white-space: pre;
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .form-group textarea {
            font-size: 12px;
            height: 156px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        #clearSearch {
            position: absolute;
            left: 14.6%;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--neon-cyan);
            cursor: pointer;
            display: none;
            font-size: 32px;
            font-weight: bold;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        #clearSearch:hover {
            background: rgba(0, 255, 255, 0.2);
            color: var(--neon-magenta);
            transform: translateY(-50%) rotate(90deg);
        }

        .search-container {
            width: 90%;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        #searchInput {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            position: relative;
            left: 14%;
            padding: 7px 5px 7px 38px;
            width: 100%;
            border-radius: 25px;
            background: rgba(15, 15, 35, 0.8);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            outline: none;
            transition: all 0.3s ease;
            box-shadow:
                0 0 20px rgba(0, 255, 255, 0.2),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        #searchInput::placeholder { color: rgba(0, 255, 255, 0.5); }
        #searchInput:focus {
            border-color: var(--neon-magenta);
            box-shadow:
                0 0 30px rgba(255, 0, 255, 0.4),
                inset 0 0 30px rgba(255, 0, 255, 0.1);
        }

        .btnInExp {
            width: 85%;
            position: fixed;
            bottom: 18px;
            left: 12px;
            display: flex;
            z-index: 1000;
            flex-direction: column;
        }

        .fundo {
            position: relative;
            left: 15%;
        }

        .btn-danger {
            background: transparent;
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .btn-danger:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 20px #ff0055, 0 0 40px rgba(255, 0, 85, 0.5);
            transform: translateY(-2px);
        }

        #offlineIndicator {
            border-radius: 50px;
            font-size: 12px;
            height: 21px;

            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

                top: 0;

    cursor: pointer;
    box-shadow: 0 4px 20px rgba(30, 144, 255, 0.4);
    transition: all 0.3s ease;
    z-index: 1000;
}

            .add-site-btn {
    bottom: 15px;
    left: 40px;
    width: 60px;
    height: 49px;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
}

            .btnInExp {
                width: 85%;
                position: fixed;
                bottom: 18px;
                left: 12px;
                display: flex;
                z-index: 1000;
                flex-direction: column;
            }

                position: absolute;

        /* =========================================
           BARRA DE BUSCA E EDITOR HOLOGRÁFICO NEON
           ========================================= */
        .code-search-bar {
            display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
            background: rgba(0, 255, 255, 0.05); padding: 8px; border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.2); position: relative;
        }

            flex: 1; padding: 8px 8px 8px 35px; border-radius: 6px; font-size: 14px; outline: none;

        .code-search-bar button.nav-btn {

        .code-search-bar button.nav-btn:hover { background: var(--neon-cyan); color: var(--dark-bg); box-shadow: 0 0 10px var(--neon-cyan); }

        .editor-wrapper {
            position: relative; width: 100%; height: 250px; border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px; background: rgba(0, 0, 0, 0.6); overflow: hidden; transition: all 0.3s;
        }
        .editor-wrapper:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        
        #siteCodeBackdrop, #siteCode {
            width: 100% !important; height: 100% !important; padding: 12px; font-family: 'Courier New', monospace;
            font-size: 14px; line-height: 20px; white-space: pre; overflow-wrap: normal; overflow-x: auto;
            position: absolute; top: 0; left: 0; border: none; outline: none; margin: 0; resize: none !important;
        }
        #siteCodeBackdrop { color: transparent; z-index: 1; pointer-events: none; }
        #siteCode { background: #ffffffcc; color: black; z-index: 2;}
        
        /* Cores do Marca-Texto */
        .mark-match { background-color: rgba(255, 0, 255, 0.4); color: transparent; border-radius: 3px; }
        .mark-active { background-color: rgba(0, 255, 255, 0.6); color: transparent; box-shadow: 0 0 0 2px var(--neon-cyan); }
        
        @media (max-width: 768px) { .editor-wrapper { height: 350px; } #clearCodeSearchBtn { left: 11px; font-size: 32px; } }
    
        /* BOTÃO GIGANTE DE OTIMIZAÇÃO */
        #bigOptimizeBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff0055, var(--neon-magenta));
            border: 4px solid var(--neon-cyan);
            color: white;
            font-size: 26px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            padding: 20px 40px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.8), 0 0 100px rgba(0, 255, 255, 0.6);
            z-index: 10000;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: none; /* Fica escondido por padrão */
            animation: pulseBtn 1.5s infinite;
        }

        @keyframes pulseBtn {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🛠️Ferramentas</h1>
            <div id="offlineIndicator"
                style="display: none; position: fixed; top: 0; left: 0; right: 0; background: #f39c12; color: white; text-align: center; padding: 5px; z-index: 9999;">
                📱 Modo Offline
            </div>
            <p></p>
        </div>
        <div class="grid-wrapper">
            <div class="sites-grid" id="sitesGrid">
                </div>
        </div>

    </div>

    <div class="btnInExp">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar sites...">
            <button id="clearSearch">×</button>
        </div>
        <div class="fundo">
            <button class="btn btn-secondary" onclick="openExportAllModal()" style="margin-left: 10px;">Exportar</button>
            <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()"
                style="margin-left: 10px;">Importar</button>
            <input type="file" id="importFile" accept=".json, .zip" style="display: none;" onchange="importSites(event)">
        </div>
        <button class="add-site-btn" onclick="openAddSiteModal()">+</button>
        <button class="search-random-btn" onclick="startVoiceSearch()">🎤</button>


        <div class="modal" id="siteModal">
            <div class="modal-content">
                <h2 id="modalTitle">Adicionar Nova Ferramenta</h2>
                <form id="siteForm">
                    <div class="form-group">
                        <label for="siteName">Nome da Ferramenta:</label>
                        <input type="text" id="siteName" required>
                    </div>
                    <div class="form-group">
                        <label for="siteDescription">Descrição:</label>
                        <input type="text" id="siteDescription">
                    </div>
                    <div class="form-group">
                        <label>Código HTML:</label>
                        <div class="code-search-bar">
                            <input type="text" id="codeSearchInput" placeholder="Encontrar no código..." oninput="performCodeSearch()">
                            <button type="button" id="clearCodeSearchBtn" onclick="resetCodeSearch()" title="Limpar Busca">×</button>
                            <span id="codeSearchCount">0/0</span>
                            <button type="button" class="nav-btn" onclick="prevCodeMatch()" title="Anterior">↑</button>
                            <button type="button" class="nav-btn" onclick="nextCodeMatch()" title="Próximo">↓</button>
                        </div>
                        <div class="editor-wrapper">
                            <div id="siteCodeBackdrop"></div>
                            <textarea id="siteCode" placeholder="Cole aqui o código HTML completo da sua ferramenta..." required spellcheck="false"></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeSiteModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="modal" id="exportAllModal">
            <div class="modal-content" style="max-width: 400px; text-align: center;">
                <h2 style="margin-bottom: 20px;">Exportar Todos os Sites</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button class="btn btn-primary" onclick="exportAllZip()">📦 Exportar como ZIP (Páginas HTML + JSON)</button>
                    <button class="btn btn-secondary" onclick="exportAllJSON()">📄 Exportar como JSON (Apenas Dados)</button>
                    <button class="btn btn-danger" onclick="closeExportAllModal()">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="modal" id="exportSingleModal">
            <div class="modal-content" style="max-width: 400px; text-align: center;">
                <h2 style="margin-bottom: 20px;">Salvar Ferramenta</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button class="btn btn-primary" onclick="executeExportSingle('html')">🌐 Salvar Página Física (.html)</button>
                    <button class="btn btn-secondary" onclick="executeExportSingle('zip')">🗜️ Salvar Pacote ZIP (Página + Dados)</button>
                    <button class="btn btn-danger" onclick="closeExportSingleModal()">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="fullscreen-overlay" id="fullscreenOverlay">
            <button id="bigOptimizeBtn" onclick="optimizeSite()">✨ Otimizar Tela ✨</button>
            <div class="fullscreen-content">
                <iframe class="site-frame" id="siteFrame" srcdoc=""
                    style="width:100%; height:100%; border:none; background:#fff;">
                </iframe>
                <div class="fullscreen-header bottom-header">
                    <div class="left-buttons" style="display: flex; gap: 10px; align-items: center;">
                        <button class="close-btn" onclick="closeFullscreen()">Fechar</button>
                        <button class="edit-btn" onclick="editCurrentSite()">Editar</button>
                        <button id="optimizeBtn" class="btn" style="display:none; border-color: #ffaa00; color: #ffaa00; font-weight: bold; padding: 3px 15px;" onclick="optimizeSite()">✨ Otimizar</button>
                    </div>
                    <h2 id="fullscreenTitle" class="title-right">Ferramenta</h2>
                </div>
            </div>
        </div>

    </div>
    
    <script>
        // Configuração do IndexedDB
        const DB_NAME = 'SitesManagerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'sites';

        let currentPage = 0;
        const ITEMS_PER_PAGE = 4;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }
        
        //variaveis globais
        let sites = [];
        let currentSiteIndex = -1;
        let editingIndex = -1;
        let lastOpenedSiteIndex = -1;
        let siteToExportIndex = -1; // Variável nova para o modal individual

        // ==========================================
        // LÓGICA DO EDITOR HOLOGRÁFICO E BUSCA
        // ==========================================
        let codeMatchPositions = [];
        let currentCodeMatchIndex = -1;
        const textarea = document.getElementById('siteCode');
        const backdrop = document.getElementById('siteCodeBackdrop');

        textarea.addEventListener('scroll', () => {
            backdrop.scrollTop = textarea.scrollTop;
            backdrop.scrollLeft = textarea.scrollLeft;
        });

        textarea.addEventListener('input', () => {
            if (codeMatchPositions.length > 0) resetCodeSearch();
        });

        function resetCodeSearch() {
            document.getElementById('codeSearchInput').value = '';
            document.getElementById('codeSearchCount').textContent = '0/0';
            document.getElementById('clearCodeSearchBtn').style.display = 'none';
            codeMatchPositions = [];
            currentCodeMatchIndex = -1;
            backdrop.innerHTML = ''; 
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function performCodeSearch() {
            codeMatchPositions = [];
            currentCodeMatchIndex = -1;
            const query = document.getElementById('codeSearchInput').value.toLowerCase();
            const text = textarea.value;
            const lowerText = text.toLowerCase();

            if (!query) { resetCodeSearch(); return; }

            document.getElementById('clearCodeSearchBtn').style.display = 'block';

            let startIndex = 0, index;
            while ((index = lowerText.indexOf(query, startIndex)) > -1) {
                codeMatchPositions.push({ start: index, end: index + query.length });
                startIndex = index + query.length;
            }

            if (codeMatchPositions.length > 0) {
                let backdropHtml = ''; let lastPos = 0;
                codeMatchPositions.forEach((pos, i) => {
                    backdropHtml += escapeHtml(text.substring(lastPos, pos.start));
                    backdropHtml += `<mark class="mark-match" id="match-${i}">${escapeHtml(text.substring(pos.start, pos.end))}</mark>`;
                    lastPos = pos.end;
                });
                backdropHtml += escapeHtml(text.substring(lastPos));
                if (text.endsWith('\n')) backdropHtml += '\n ';

                backdrop.innerHTML = backdropHtml;
                currentCodeMatchIndex = 0;
                highlightCurrentCodeMatch(); 
            } else {
                backdrop.innerHTML = escapeHtml(text);
                document.getElementById('codeSearchCount').textContent = '0/0';
            }
        }

        function highlightCurrentCodeMatch() {
            if (codeMatchPositions.length === 0) return;
            document.getElementById('codeSearchCount').textContent = `${currentCodeMatchIndex + 1}/${codeMatchPositions.length}`;
            
            document.querySelectorAll('.mark-match').forEach(el => el.classList.remove('mark-active'));
            const currentMark = document.getElementById(`match-${currentCodeMatchIndex}`);
            
            if (currentMark) {
                currentMark.classList.add('mark-active');
                backdrop.scrollTop = currentMark.offsetTop - (backdrop.clientHeight / 2) + (currentMark.clientHeight / 2);
                backdrop.scrollLeft = currentMark.offsetLeft - (backdrop.clientWidth / 2);
                textarea.scrollTop = backdrop.scrollTop;
                textarea.scrollLeft = backdrop.scrollLeft;
            }
        }

        function nextCodeMatch() {
            if (codeMatchPositions.length === 0) return;
            currentCodeMatchIndex = (currentCodeMatchIndex + 1) % codeMatchPositions.length;
            highlightCurrentCodeMatch(); 
        }

        function prevCodeMatch() {
            if (codeMatchPositions.length === 0) return;
            currentCodeMatchIndex = (currentCodeMatchIndex - 1 + codeMatchPositions.length) % codeMatchPositions.length;
            highlightCurrentCodeMatch();
        }

        // Suporte à tecla TAB no editor de código
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "\t" + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 1;
                if(backdrop.innerHTML !== '') { backdrop.innerHTML = escapeHtml(this.value); resetCodeSearch(); }
            }
        });

        // Carregar sites do armazenamento ou criar site exemplo
        async function loadSites() {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onsuccess = () => {
                    if (request.result.length > 0) {
                        sites = request.result.map(item => ({
                            name: item.name,
                            description: item.description,
                            code: item.code
                        }));
                    } else {
                        sites = [{
                            name: "Contador de Cliques",
                            description: "Ferramenta simples para contar cliques",
                            code: `<!DOCTYPE html>
<html lang="pt-BR">
<head><style>body { text-align: center; padding: 50px; font-family: sans-serif; }</style></head>
<body>
    <h1>0</h1>
    <button onclick="document.querySelector('h1').innerText = parseInt(document.querySelector('h1').innerText) + 1">Clicar!</button>
</body>
</html>`
                        }];
                        saveSites();
                    }

                    const savedLastOpened = localStorage.getItem('lastOpenedSiteIndex');
                    if (savedLastOpened !== null) {
                        const index = parseInt(savedLastOpened);
                        if (index >= 0 && index < sites.length) {
                            lastOpenedSiteIndex = index;
                        }
                    }

                    renderSites();
                };
            } catch (error) {
                console.error('Erro ao carregar sites:', error);
                renderSites();
            }
        }

        // Salvar sites no armazenamento indexedb
        async function saveSites() {
            try {
                const db = await initDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                const clearRequest = store.clear();
                clearRequest.onsuccess = () => {
                    sites.forEach(site => {
                        store.add(site);
                    });
                };
            } catch (error) {
                console.error('Erro ao salvar sites:', error);
            }
        }

        // Renderizar lista de sites
        function renderSites(append = false) {
            const grid = document.getElementById('sitesGrid');

            if (!append) {
                grid.innerHTML = '';
                currentPage = 0;
            }

            let sitesToRender = sites.slice().reverse();
            if (lastOpenedSiteIndex >= 0) {
                const lastOpenedSite = sites[lastOpenedSiteIndex];
                sitesToRender = sitesToRender.filter(site => site !== lastOpenedSite);
                sitesToRender.unshift(lastOpenedSite);
            }

            const start = currentPage * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageItems = sitesToRender.slice(start, end);

            pageItems.forEach((site) => {
                const index = sites.indexOf(site);
                const card = document.createElement('div');
                card.className = 'site-card';
                // MODIFICADO: Adicionado botão Exportar no cartão
                card.innerHTML = `
            <h3>${site.name}</h3>
            <p>${site.description || 'Sem descrição'}</p>
            <div class="site-actions">
                <button class="btn btn-primary" onclick="openSite(${index})">Abrir</button>
                <button class="btn edit-btn" onclick="editSite(${index})">Editar</button>
                <button class="btn btn-secondary" onclick="openExportSingleModal(${index})">Exportar</button>
                <button class="btn btn-danger" onclick="deleteSite(${index})">Excluir</button>
            </div>
        `;
                grid.appendChild(card);
            });

            if (end < sitesToRender.length) {
                const loadBtn = document.createElement('button');
                loadBtn.className = 'btn btn-secondary';
                loadBtn.textContent = `Carregar mais (${sitesToRender.length - end} restantes)`;
                loadBtn.style.cssText = 'width:100%; margin-top:10px; grid-column: 1/-1;';
                loadBtn.onclick = () => {
                    currentPage++;
                    loadBtn.remove();
                    renderSites(true);
                };
                grid.appendChild(loadBtn);
            }
        }

        //Adicionar funcionalidade de pesquisa
        function filterSites(searchTerm) {
            if (!searchTerm.trim()) {
                renderSites();
                return;
            }

            const searchWords = searchTerm.trim().split(/\s+/).map(word => normalizeText(word));

            const filteredSites = sites.filter(site => {
                const normalizedName = normalizeText(site.name);
                const normalizedDesc = site.description ? normalizeText(site.description) : '';

                if (searchWords.length === 1) {
                    return normalizedName.includes(searchWords[0]) || normalizedDesc.includes(searchWords[0]);
                } else {
                    const nameContainsAll = searchWords.every(word => normalizedName.includes(word));
                    const descContainsAll = searchWords.every(word => normalizedDesc.includes(word));
                    return nameContainsAll || descContainsAll;
                }
            });

            const grid = document.getElementById('sitesGrid');
            grid.innerHTML = '';

            if (filteredSites.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #666; font-style: italic;">Nenhum site encontrado</p>';
                return;
            }
            
            let sitesToRender = filteredSites.slice().reverse();
            if (lastOpenedSiteIndex >= 0) {
                const lastOpenedSite = sites[lastOpenedSiteIndex];
                if (filteredSites.includes(lastOpenedSite)) {
                    sitesToRender = sitesToRender.filter(site => site !== lastOpenedSite);
                    sitesToRender.unshift(lastOpenedSite);
                }
            }
            sitesToRender.forEach((site) => {
                const originalIndex = sites.indexOf(site);
                const card = document.createElement('div');
                card.className = 'site-card';
                // MODIFICADO: Adicionado botão Exportar
                card.innerHTML = `
                    <h3>${site.name}</h3>
                    <p>${site.description || 'Sem descrição'}</p>
                    <div class="site-actions">
                        <button class="btn btn-primary" onclick="openSite(${originalIndex})">Abrir</button>
                        <button class="btn edit-btn" onclick="editSite(${originalIndex})">Editar</button>
                        <button class="btn btn-secondary" onclick="openExportSingleModal(${originalIndex})">Exportar</button>
                        <button class="btn btn-danger" onclick="deleteSite(${originalIndex})">Excluir</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Abrir site em tela cheia com Super Espião

        // Abrir site em tela cheia (Volta do srcdoc com Espião Seguro)
        function openSite(index) {
            currentSiteIndex = index;
            lastOpenedSiteIndex = index;
            localStorage.setItem('lastOpenedSiteIndex', index.toString());
            const site = sites[index];
            document.getElementById('fullscreenTitle').textContent = site.name;
            
            const iframe = document.getElementById('siteFrame');
            const bigBtn = document.getElementById('bigOptimizeBtn');
            
            // Esconde o botão gigante e limpa a memória
            bigBtn.style.display = 'none';
            iframe.srcdoc = '';

            document.getElementById('fullscreenOverlay').style.display = 'block';

            // VOLTAMOS PARA O SRCDOC RAIZ (com um micro-atraso para limpar o cache)
            setTimeout(() => {
                iframe.srcdoc = site.code;
            }, 50);

            // ESPIÃO MAIS INTELIGENTE (Espera 3 segundos)
            setTimeout(() => {
                try {
                    const doc = iframe.contentWindow.document;
                    // Se o HTML dentro do body for literalmente vazio, a tela tá branca
                    const bodyHtml = doc.body ? doc.body.innerHTML.trim() : '';
                    
                    if (bodyHtml === '') {
                        console.warn('Tela branca detectada pelo espião!');
                        bigBtn.style.display = 'block';
                    }
                } catch (e) {
                    // Erros de segurança (scripts externos bloqueados) também ativam o botão
                    bigBtn.style.display = 'block';
                }
            }, 3000);
        }



        // Fechar tela cheia
        function closeFullscreen() {
            const iframe = document.getElementById('siteFrame');
            iframe.srcdoc = '';
            iframe.src = 'about:blank'; 
            document.getElementById('fullscreenOverlay').style.display = 'none';
            currentSiteIndex = -1;
            renderSites();
        }

// Abrir modal para adicionar site
        function openAddSiteModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = 'Adicionar Nova Ferramenta';
            document.getElementById('siteName').value = '';
            document.getElementById('siteDescription').value = '';
            document.getElementById('siteCode').value = '';
            resetCodeSearch(); // <- Limpa a busca anterior
            document.getElementById('siteModal').style.display = 'block';
        }

        // Editar site
        function editSite(index) {
            if (index < 0 || index >= sites.length) {
                console.error('Índice de site inválido:', index);
                return;
            }

            editingIndex = index;
            const site = sites[index];
            document.getElementById('modalTitle').textContent = 'Editar Ferramenta';
            document.getElementById('siteName').value = site.name;
            document.getElementById('siteDescription').value = site.description || '';
            document.getElementById('siteCode').value = site.code;
            resetCodeSearch(); // <- Limpa a busca anterior
            document.getElementById('siteModal').style.display = 'block';
        }
        
        function deleteSite(index) {
            if (index < 0 || index >= sites.length) return;

            const site = sites[index];
            if (confirm(`Tem certeza que deseja excluir "${site.name}"?`)) {
                sites.splice(index, 1);
                if (lastOpenedSiteIndex === index) {
                    lastOpenedSiteIndex = -1;
                    localStorage.removeItem('lastOpenedSiteIndex');
                } else if (lastOpenedSiteIndex > index) {
                    lastOpenedSiteIndex--;
                    localStorage.setItem('lastOpenedSiteIndex', lastOpenedSiteIndex.toString());
                }
                saveSites();
                renderSites();
            }
        }

        function editCurrentSite() {
            if (currentSiteIndex >= 0 && currentSiteIndex < sites.length) {
                const indexToEdit = currentSiteIndex; 
                closeFullscreen();
                setTimeout(() => {
                    editSite(indexToEdit);
                }, 100);
            }
        }

        function closeSiteModal() {
            document.getElementById('siteModal').style.display = 'none';
        }

        document.getElementById('siteForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('siteName').value;
            const description = document.getElementById('siteDescription').value;
            const code = document.getElementById('siteCode').value;

            const siteData = { name, description, code };

            if (editingIndex >= 0) {
                sites[editingIndex] = siteData;
            } else {
                sites.push(siteData);
            }

            saveSites();
            renderSites();
            closeSiteModal();
        });


        // -----------------------------------------------------------
        // LÓGICA DE EXPORTAÇÃO (MODAIS E JSZIP)
        // -----------------------------------------------------------

        function sanitizeFilename(name) { 
            return name.replace(/[^a-z0-9]/gi, '_').toLowerCase(); 
        }

        function openExportAllModal() { document.getElementById('exportAllModal').style.display = 'block'; }
        function closeExportAllModal() { document.getElementById('exportAllModal').style.display = 'none'; }
        
        function openExportSingleModal(index) {
            siteToExportIndex = index;
            document.getElementById('exportSingleModal').style.display = 'block';
        }
        function closeExportSingleModal() {
            siteToExportIndex = -1;
            document.getElementById('exportSingleModal').style.display = 'none';
        }

        window.addEventListener('click', function (e) {
            if (e.target.classList.contains('modal')) e.target.style.display = 'none';
        });

        // Exportação Geral (Botão Inferior)
        function exportAllJSON() {
            const dataStr = JSON.stringify(sites, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = 'meus_sites_backup.json';
            link.click();
            closeExportAllModal();
        }

        function exportAllZip() {
            if (typeof JSZip === 'undefined') { alert('Erro: JSZip não foi carregado. Verifique sua conexão ou se o jszip.min.js existe na pasta.'); return; }
            
            const zip = new JSZip();
            zip.file("sites_backup.json", JSON.stringify(sites, null, 2));
            
            sites.forEach(site => {
                zip.file(`${sanitizeFilename(site.name)}.html`, site.code);
            });
            
            zip.generateAsync({ type: "blob" }).then(content => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "minhas_ferramentas_completas.zip";
                link.click();
            });
            closeExportAllModal();
        }

        // Exportação Individual (Botão no Cartão)
        function executeExportSingle(format) {
            if (siteToExportIndex < 0 || siteToExportIndex >= sites.length) return;
            
            const site = sites[siteToExportIndex];
            const safeName = sanitizeFilename(site.name);
            const link = document.createElement('a');

            if (format === 'html') {
                const blob = new Blob([site.code], { type: 'text/html' });
                link.href = URL.createObjectURL(blob);
                link.download = `${safeName}.html`;
                link.click();
            } else if (format === 'zip') {
                if (typeof JSZip === 'undefined') { alert("JSZip não carregado"); return; }
                const zip = new JSZip();
                zip.file(`${safeName}.html`, site.code);
                zip.file(`${safeName}_backup.json`, JSON.stringify([site], null, 2));
                
                zip.generateAsync({ type: "blob" }).then(content => {
                    link.href = URL.createObjectURL(content);
                    link.download = `${safeName}.zip`;
                    link.click();
                });
            }
            closeExportSingleModal();
        }


        // -----------------------------------------------------------
        // LÓGICA DE IMPORTAÇÃO (JSON & ZIP)
        // -----------------------------------------------------------

        function importSites(event) {
            const file = event.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'json') {
                processJSONImport(file);
            } else if (ext === 'zip') {
                processZIPImport(file);
            } else {
                alert("Formato inválido. Selecione um arquivo .zip ou .json");
            }
            event.target.value = '';
        }

        function processJSONImport(file) {
            const reader = new FileReader();
            reader.onload = async e => {
                try {
                    const importedSites = JSON.parse(e.target.result);
                    if (Array.isArray(importedSites)) {
                        if (confirm('Deseja ADICIONAR esses sites à sua lista atual? (Se cancelar, todos os atuais serão SUBSTITUÍDOS)')) {
                            sites = sites.concat(importedSites);
                        } else {
                            sites = importedSites;
                        }
                        await saveSites();
                        renderSites();
                        alert('Ferramentas importadas com sucesso!');
                    } else {
                        alert('Arquivo JSON inválido!');
                    }
                } catch (error) {
                    alert('Erro ao importar arquivo JSON: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        async function processZIPImport(file) {
            if (typeof JSZip === 'undefined') { alert("Biblioteca JSZip ausente."); return; }
            
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                let backupFile = Object.keys(contents.files).find(n => n.endsWith('.json'));

                if (backupFile) {
                    // Importando dados puros (JSON) que estavam dentro do ZIP
                    const text = await contents.files[backupFile].async("string");
                    const importedSites = JSON.parse(text);
                    if (Array.isArray(importedSites)) {
                        if (confirm('Backup de sistema encontrado no ZIP! Deseja MISTURAR com seus sites atuais? (Cancelar = Substituir tudo)')) {
                            sites = sites.concat(importedSites);
                        } else {
                            sites = importedSites;
                        }
                        await saveSites();
                        renderSites();
                        alert('Dados restaurados com sucesso a partir do ZIP!');
                    }
                } else {
                    // Sem JSON. Buscar qualquer arquivo HTML solto e cadastrar como nova ferramenta
                    const newSites = [];
                    for (let filename of Object.keys(contents.files)) {
                        if (filename.endsWith('.html')) {
                            const htmlContent = await contents.files[filename].async("string");
                            newSites.push({
                                name: filename.replace('.html', '').replace(/_/g, ' '),
                                description: 'Ferramenta importada fisicamente (.html)',
                                code: htmlContent
                            });
                        }
                    }
                    if (newSites.length > 0) {
                        if (confirm(`Encontradas ${newSites.length} ferramentas HTML no ZIP. Deseja importá-las para sua biblioteca?`)) {
                            sites = sites.concat(newSites);
                            await saveSites();
                            renderSites();
                            alert('Ferramentas HTML instaladas com sucesso!');
                        }
                    } else {
                        alert("Nenhum arquivo JSON de backup ou código HTML encontrado neste arquivo ZIP.");
                    }
                }
            } catch (err) {
                alert('Erro ao processar o arquivo ZIP: ' + err.message);
            }
        }


        function normalizeText(text) {
            return text.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        // Verifica suporte ao reconhecimento de voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        // ==========================================
        // BUSCA PRINCIPAL (DIGITAÇÃO E BOTÃO LIMPAR)
        // ==========================================
        let searchTimeout;
        const mainSearchInput = document.getElementById('searchInput');
        const mainClearBtn = document.getElementById('clearSearch');

        if (mainSearchInput && mainClearBtn) {
            // Escuta cada vez que você digita ou apaga uma letra
            mainSearchInput.addEventListener('input', function (e) {
                const searchTerm = e.target.value;

                // Mostra ou esconde o botão "X"
                if (searchTerm.trim() !== '') {
                    mainClearBtn.style.display = 'block';
                } else {
                    mainClearBtn.style.display = 'none';
                }

                // Espera você parar de digitar por 300ms antes de buscar (evita travamentos)
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterSites(searchTerm);
                }, 300);
            });

            // O que acontece quando clica no botão "X"
            mainClearBtn.addEventListener('click', function () {
                mainSearchInput.value = '';
                mainClearBtn.style.display = 'none';
                renderSites(); // Mostra todos os sites de novo
                mainSearchInput.focus(); // Mantém o teclado aberto
            });

            // Bônus: Limpar a busca apertando a tecla "Esc" do teclado (se usar no PC)
            mainSearchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    mainSearchInput.value = '';
                    mainClearBtn.style.display = 'none';
                    renderSites();
                }
            });
        }
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR'; 
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript.trim();

                const searchInput = document.getElementById('searchInput');
                const clearBtn = document.getElementById('clearSearch');

                searchInput.value = transcript;
                clearBtn.style.display = 'block';

                filterSites(transcript);
            };

            recognition.onerror = function (event) {
                console.error('Erro no reconhecimento de voz:', event.error);
            };

            window.startVoiceSearch = function() {
                recognition.start();
            }
        } else {
            window.startVoiceSearch = function() {
                alert('Reconhecimento de voz não suportado neste navegador.');
                console.log("SpeechRecognition não está disponível.");
            }
        }

        //service worker para funcionamento offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js')
                    .then(function (registration) {
                        console.log('SW registrado com sucesso:', registration.scope);

                        registration.addEventListener('updatefound', function () {
                            console.log('Nova versão do SW disponível');
                        });
                    })
                    .catch(function (error) {
                        console.log('Falha ao registrar SW:', error);
                    });
            });
        }
        
        // Detectar status offline/online
        function updateOnlineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            if (navigator.onLine) {
                indicator.style.display = 'none';
                indicator.textContent = '🌐 Online';
            } else {
                indicator.style.display = 'block';
                indicator.textContent = '📱 Modo Offline - Funcionalidade completa disponível';
            }
        }

        window.addEventListener('load', function () {
            updateOnlineStatus();

            fetch('./manifest.json', { method: 'HEAD', cache: 'no-cache' })
                .then(() => {
                    console.log('Conectividade confirmada');
                })
                .catch(() => {
                    console.log('Sem conectividade real');
                    const indicator = document.getElementById('offlineIndicator');
                    indicator.style.display = 'block';
                    indicator.textContent = '📱 Modo Offline';
                });
        });

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus(); 
        
        // ==========================================
        // SISTEMA DE OTIMIZAÇÃO E RECUPERAÇÃO
        // ==========================================

// Sistema de Otimização com TRAVA ANTI-LOOP
        function optimizeSite() {
            if (currentSiteIndex >= 0) {
                // Verifica se já tentamos otimizar essa tela nos últimos segundos
                let tentativas = parseInt(sessionStorage.getItem('anti_loop_trava') || '0');
                
                if (tentativas >= 1) {
                    // SE ENTRAR EM LOOP: Quebra o sistema, avisa e fecha!
                    alert('⚠️ Falha crítica: O código desta ferramenta parece ter um erro grave ou depende de uma biblioteca externa que não carrega offline. Edite o código e tente novamente.');
                    sessionStorage.removeItem('anti_loop_trava');
                    closeFullscreen();
                    return;
                }

                // Marca que estamos tentando otimizar (1 tentativa)
                sessionStorage.setItem('anti_loop_trava', '1');
                
                // Salva o site para reabrir
                localStorage.setItem('autoRecoverIndex', currentSiteIndex.toString());
                
                // Limpa e recarrega
                const iframe = document.getElementById('siteFrame');
                iframe.src = 'about:blank';
                window.location.reload();
            }
        }

        // Carregar sites ao iniciar e recuperar quebras
        (async () => {
            await loadSites();
            
            const recoverIndex = localStorage.getItem('autoRecoverIndex');
            if (recoverIndex !== null) {
                // Limpa o gatilho de auto-recover
                localStorage.removeItem('autoRecoverIndex'); 
                // Reabre o site com pequeno atraso
                setTimeout(() => openSite(parseInt(recoverIndex)), 500); 
            } else {
                // Se abriu a página normalmente (sem ser pelo botão de otimizar), zera a trava de segurança
                sessionStorage.removeItem('anti_loop_trava');
            }
        })();
    </script>
